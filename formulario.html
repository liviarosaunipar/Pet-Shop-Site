<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações sobre seu Pet</title>
</head>

<body>
    <h1>Cadastro de Informações do Pet</h1>
    <p>Por favor, preencha o formulário abaixo com os dados do seu bichinho.</p>
    <hr> <br>
    
    <form action="" method="POST" autocomplete="off">
        
        <label for="nomepet">Nome do Pet:</label>
        <input type="text" name="nomepet" id="nomepet" minlength="3" maxlength="15" required> 
        <br><br>

        <label for="idade">Idade do Pet:</label>
        <input type="number" name="idade" id="idade" min="0" max="30" placeholder="Ex: 3" required>
        <br><br>

        <label for="ano">Ano de nascimento:</label>
        <input type="number" id="ano" name="ano" min="1900" max="2026">
        <br><br>

        <label for="genero">Gênero:</label>
        <select name="genero" id="genero" required>
            <option value="">Selecione...</option> 
            <option value="macho">Macho</option>
            <option value="femea">Fêmea</option>
        </select>
        <br><br>

        <fieldset>
            <legend>Qual o porte?</legend>
            
            <input type="radio" name="porte" id="porte-pequeno" value="pequeno">
            <label for="porte-pequeno">Pequeno</label>

            <input type="radio" name="porte" id="porte-medio" value="medio">
            <label for="porte-medio">Médio</label>

            <input type="radio" name="porte" id="porte-grande" value="grande">
            <label for="porte-grande">Grande</label>
        </fieldset>
        <br><br> 

        <button type="submit">Enviar Informações</button>

    </form>
</body>
</html>
